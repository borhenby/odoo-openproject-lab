version: "3.8"

services:
  postgres_odoo:
    image: postgres:15
    container_name: postgres_odoo
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_pass
    volumes:
      - postgres_odoo_data:/var/lib/postgresql/data

  odoo:
    image: odoo:18
    container_name: odoo
    depends_on:
      - postgres_odoo
    ports:
      - "8069:8069"
    environment:
      HOST: postgres_odoo
      USER: odoo
      PASSWORD: odoo_pass

  postgres-openproject:
    image: postgres:15
    container_name: postgres_openproject
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: openproject_pass
    volumes:
      - postgres_openproject_data:/var/lib/postgresql/data

  openproject:
    image: openproject/openproject:15
    container_name: openproject
    depends_on:
      - postgres-openproject
    ports:
      - "8080:80"
    environment:
      OPENPROJECT_SECRET_KEY_BASE: supersecretkey123
      DATABASE_URL: postgres://openproject:openproject_pass@postgres-openproject/openproject
      OPENPROJECT_HOST__NAME: 54.224.13.214:8080
      OPENPROJECT_HTTPS: "false"

volumes:
  postgres_odoo_data:
  postgres_openproject_data:
